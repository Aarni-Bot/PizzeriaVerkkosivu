<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Nyt - Ruokalista</title>
    <link rel="icon" type="image/x-icon" href="/images/WebsiteLogo.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <a href="index.html">Pizza<span>Nyt</span></a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Koti</a></li>
            <li><a href="menu.html" class="selected">Ruokalista</a></li>
            <li><a href="contact.html">Ota yhteyttä</a></li>
            <li class="login-btn"><a href="login.html">Kirjaudu</a></li>
            <li class="cart-container">
                <a class="cart-link">
                    <div class="cart-wrapper">
                        <img src="images/cart.png" alt="Ostoskori" class="cart-icon">
                        <span class="cart-quantity" id="cart-count">0</span>
                    </div>
                </a>
            </li>
            
        </ul>
    </nav>

    <main class="menu-container">
        <div class="pizza-card">
            <h3>BBQ-kanapizza Pizza</h3>
            <img src="pizzas/ChickenBBQ.png" alt="BBQ-kanapizza">
            <div class="quantity-controls">
                <button class="decrease">−</button>
                <input type="number" class="pizza-quantity" min="1" max="99" value="1">
                <button class="increase">+</button>
            </div>
            <button class="order-btn">Lisää ostoskoriin</button>
        </div>

        <div class="pizza-card">
            <h3>Klassikko Pepperoni Pizza</h3>
            <img src="pizzas/Pepperoni.png" alt="Pepperoni pizza">
            <div class="quantity-controls">
                <button class="decrease">−</button>
                <input type="number" class="pizza-quantity" min="1" max="99" value="1">
                <button class="increase">+</button>
            </div>
            <button class="order-btn">Lisää ostoskoriin</button>
        </div>

        <div class="pizza-card">
            <h3>Kinkku-ananas Pizza</h3>
            <img src="pizzas/Hawaiian.png" alt="Kinkku-ananas pizza">
            <div class="quantity-controls">
                <button class="decrease">−</button>
                <input type="number" class="pizza-quantity" min="1" max="99" value="1">
                <button class="increase">+</button>
            </div>
            <button class="order-btn">Lisää ostoskoriin</button>
        </div>

        <div class="pizza-card">
            <h3>Meat Lovers Pizza</h3>
            <img src="pizzas/MeatLovers.png" alt="Meat lovers pizza">
            <div class="quantity-controls">
                <button class="decrease">−</button>
                <input type="number" class="pizza-quantity" min="1" max="99" value="1">
                <button class="increase">+</button>
            </div>
            <button class="order-btn">Lisää ostoskoriin</button>
        </div>

        <div class="pizza-card">
            <h3>Vege Pizza</h3>
            <img src="pizzas/Veggie.png" alt="Vege pizza">
            <div class="quantity-controls">
                <button class="decrease">−</button>
                <input type="number" class="pizza-quantity" min="1" max="99" value="1">
                <button class="increase">+</button>
            </div>
            <button class="order-btn">Lisää ostoskoriin</button>
        </div>








    </main>

    <script src="script.js"></script>
</body>
</html>
